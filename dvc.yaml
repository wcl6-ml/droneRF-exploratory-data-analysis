stages:
  # ── Stage 1: aggregate raw csv data to .h5 ───────────────────
  generate_data:
    cmd: python src/data/data_aggregator.py
    deps:
      - src/data/data_aggregator.py
    params:
      - config/params.yaml:
          - data_aggregator        # DVC tracks only this subtree
    outs:
      - data/interim/dronerf.h5
      - data/interim/dronerf.meta.parquet
      - data/interim/dronerf_splits.json



  # ── Stage 2: Feature Engineering ───────────────────────────────
  # KEY STAGE for feature versioning:
  featurize:
    foreach: ["H", "L"]        # DVC iterates over this list
    do:
      cmd: python src/data/featurize.py --band ${item}
      deps:
        - src/data/featurize.py
        - data/interim/dronerf.h5
      params:
        - config/params.yaml:
            - featurize            # DVC tracks only this subtree
      outs:
        - data/processed/${item}_scalar.npz
        - data/processed/${item}_meta.parquet

#  # ── Stage 3: Train ──────────────────────────────────────────────
  train:
    cmd: python src/train/train.py
    deps:
      - src/train/train.py
      - src/models/model.py
      - data/processed/H_scalar.npz
      - data/processed/L_scalar.npz
      - data/interim/dronerf_splits.json
    params:
      - config/params.yaml:
          - train
    outs:
      - models/model.onnx
      - models/model.pt
      - models/scaler.json
    metrics:
      - metrics/scores.json:
          cache: false
 
  eval_onnx:
    cmd: python src/train/eval_onnx.py
    deps:
      - src/train/eval_onnx.py
      - models/model.onnx
      - models/scaler.json
      - data/processed/H_scalar.npz
      - data/processed/L_scalar.npz
    metrics:
      - metrics/onnx_scores.json:
          cache: false
